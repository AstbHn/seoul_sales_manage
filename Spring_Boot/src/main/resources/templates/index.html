<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>서울시 상권 [음식점] 예측·분석 시스템</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-52F6BP6M76"></script>
    <script th:src="@{/js/analytics.js}"></script>
</head>
<body onload="trackPage('index')">

<header>
    <div class="system-title">서울시 상권 음식점 예측·분석 시스템</div>
    <div class="page-title">메인 화면</div>
</header>

<main>
    <div class="main-container">
        <h2 class="main-title">메인 기능 선택</h2>

        <div class="main-actions">

            <form th:action="@{/viewpage}" method="get">
                <button type="submit" onclick="trackPage('viewpage')">
                    기존 자료 차트 & 리스트
                </button>
            </form>

            <form th:action="@{/update_data}" method="get">
                <button type="submit" onclick="trackPage('update_data')">
                    기존 자료 데이터 업데이트
                </button>
            </form>

            <form th:action="@{/preview}" method="get">
                <button type="submit" onclick="trackPage('preview')">
                    예측
                </button>
            </form>

        </div>
    </div>
</main>

</body>
</html>
